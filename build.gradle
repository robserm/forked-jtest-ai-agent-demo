plugins {
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Add implementation dependencies here, e.g.:

    testImplementation 'org.mockito:mockito-junit-jupiter:4.11.0'
    testImplementation 'org.mockito:mockito-inline:4.11.0'
    testImplementation 'org.junit.jupiter:junit-jupiter:5.12.1'
    testImplementation 'org.junit.jupiter:junit-jupiter-migrationsupport:5.12.1'
    testRuntimeOnly    'org.junit.platform:junit-platform-runner:1.12.1'
    testImplementation 'org.junit.vintage:junit-vintage-engine:5.12.1'

}

test {
    // print short tests summary
    afterSuite { desc, result ->
        if (!desc.parent)
            println("Test results: ${result.successfulTestCount} successes, ${result.failedTestCount} failures, ${result.skippedTestCount} skipped")
    }

    useJUnitPlatform()

    // ignore test failures for demo purposes
    ignoreFailures = true

}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}


